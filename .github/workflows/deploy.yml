name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-ec2:
    name: Deploy to EC2 (gmhans.com)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: sudo /opt/deploy-eg-gm-hans.sh

  build-s3:
    name: Build static site for S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate static site (baseURL /gmhans/)
        run: npx nuxt generate
        env:
          NUXT_APP_BASE_URL: /gmhans/

      - uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: .output/public

  deploy-s3-test:
    name: Deploy to S3 + invalidate CF (test)
    needs: build-s3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: static-site
          path: public

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_TEST }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_TEST }}
          aws-region: us-east-1

      - run: aws s3 sync public s3://eg-gm-hans-static/gmhans --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID_TEST }} --paths "/gmhans/*" "/gmhans"

  deploy-s3-prod:
    name: Deploy to S3 + invalidate CF (prod)
    needs: build-s3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: static-site
          path: public

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - run: aws s3 sync public s3://eg-gm-hans-static-prod/gmhans --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID_PROD }} --paths "/gmhans/*" "/gmhans"
